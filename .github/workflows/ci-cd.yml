name: CI-CD

on:
  push:
    branches:
      - main
      - feature/**
      - fix/**
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: Product API tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/feature/') || startsWith(github.ref, 'refs/heads/fix/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Lab7.slnx

      - name: Build
        run: dotnet build Lab7.slnx --no-restore --configuration Release

      - name: Run ProductApiTests
        run: dotnet test Lab7.Tests/Lab7.Tests.csproj --configuration Release --no-build --filter "FullyQualifiedName~ProductApiTests"

  k6-tests:
    name: k6 API tests
    runs-on: ubuntu-latest
    needs: api-tests
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/feature/') || startsWith(github.ref, 'refs/heads/fix/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Lab7.Api/Lab7.Api.csproj

      - name: Build API
        run: dotnet build Lab7.Api/Lab7.Api.csproj --no-restore --configuration Release

      - name: Start API
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://127.0.0.1:5016
          UseInMemoryDatabase: "true"
        run: |
          dotnet run --project Lab7.Api/Lab7.Api.csproj --no-build --configuration Release > api.log 2>&1 &
          echo $! > api.pid
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:5016/api/products >/dev/null; then
              echo "API is ready"
              exit 0
            fi
            sleep 2
          done
          cat api.log
          exit 1

      - name: Run k6 ci test
        run: |
          docker run --rm --network host \
            -v "$PWD:/work" \
            -w /work \
            grafana/k6:0.52.0 \
            run -e BASE_URL=http://127.0.0.1:5016 k6/ci-test.js

      - name: Stop API
        if: always()
        run: |
          if [ -f api.pid ]; then
            kill "$(cat api.pid)" || true
          fi

      - name: Upload API log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-log
          path: api.log

  cd-docker-build:
    name: CD docker build
    runs-on: ubuntu-latest
    needs: [api-tests, k6-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.api-tests.result == 'success' || needs.api-tests.result == 'skipped') && (needs.k6-tests.result == 'success' || needs.k6-tests.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API docker image
        run: docker build -t lab7-api:latest Lab7.Api
